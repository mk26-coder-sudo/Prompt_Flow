<!DOCTYPE html>
<html>
<head>
    <title>Register - PromptFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: "#0f172a",
                        cardDark: "#1e293b",
                        accent: "#3b82f6"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center min-h-screen text-white">

<div class="bg-cardDark/80 backdrop-blur p-8 rounded-2xl shadow-xl border border-gray-700 w-full max-w-md">

    <!-- TITLE -->
    <h2 class="text-3xl font-bold text-center mb-2">✨ Create Account</h2>
    <p class="text-gray-400 text-center mb-6 text-sm">Join PromptFlow</p>

    <!-- USERNAME -->
    <input id="username" type="text" placeholder="Username"
        class="w-full mb-4 p-3 rounded-lg bg-gray-800 border border-gray-700 
        focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>

    <!-- EMAIL -->
    <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 p-3 rounded-lg bg-gray-800 border border-gray-700 
        focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>

    <!-- PASSWORD -->
    <input id="password" type="password" placeholder="Password"
        class="w-full mb-5 p-3 rounded-lg bg-gray-800 border border-gray-700 
        focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>

    <!-- BUTTON -->
    <button id="submitBtn" onclick="handleSubmit()"
    class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 py-3 rounded-lg font-semibold shadow hover:scale-105 transition flex items-center justify-center gap-2">
    
    <span id="btnText">Register</span>

    <svg id="loader" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"></circle>
        <path class="opacity-75" fill="white"
            d="M4 12a8 8 0 018-8v8z"></path>
    </svg>
</button>

    <!-- ERROR -->
    <p id="errorMsg" class="text-red-400 text-sm mt-4 text-center hidden"></p>

    <!-- LOGIN LINK -->
    <p class="text-sm text-center mt-4 text-gray-400">
        Already have an account?
        <a href="/ui" class="text-blue-400 hover:underline">Login</a>
    </p>

</div>

<script>
function registerUser() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !email || !password) {
        showError("Please fill all fields");
        return;
    }

    fetch("http://127.0.0.1:5000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username,
            email,
            password
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        if (data.status === "success") {
            window.location.href = "/ui";
        } else {
            showError(data.message);
        }
    })
    .catch(err => {
        console.error(err);
        showError("Server error");
    });
}

function showError(msg) {
    const error = document.getElementById("errorMsg");
    error.innerText = msg;
    error.classList.remove("hidden");
}
</script>

</body>
</html>
