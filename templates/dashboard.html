<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - PromptFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: "#0f172a",
                        cardDark: "#1e293b",
                        accent: "#3b82f6"
                    }
                }
            }
        }

        function openProject(project_id) {
            window.location.href = `/prompts?project_id=${project_id}`;
        }
    </script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-white min-h-screen p-8">

<h1 class="text-4xl font-bold mb-8 tracking-wide">🚀 PromptFlow Dashboard</h1>

<!-- CREATE PROJECT -->
<div class="bg-cardDark/80 backdrop-blur p-6 rounded-2xl shadow-lg border border-gray-700">

    <h2 class="text-lg font-semibold mb-3 text-gray-300">Create New Project</h2>
    
    <input id="projectTitle" type="text" placeholder="Project Title"
        class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none"/>

    <input id="projectDesc" type="text" placeholder="Description (optional)"
        class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none"/>

    <button onclick="createProject()"
        class="mt-2 bg-gradient-to-r from-blue-500 to-indigo-500 px-5 py-2 rounded-lg shadow hover:scale-105 transition">
        + Create Project
    </button>
</div>

<!-- MY PROJECTS -->
<div class="mt-10">
    <h2 class="text-2xl font-semibold mb-4">🟢 My Projects</h2>
    <div id="myProjectsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
</div>

<!-- SHARED PROJECTS -->
<div class="mt-10">
    <h2 class="text-2xl font-semibold mb-4">🔵 Shared With Me</h2>
    <div id="sharedProjectsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
</div>

<script>

// CREATE PROJECT
function createProject() {
    const title = document.getElementById("projectTitle").value;
    const description = document.getElementById("projectDesc").value;
    const user_id = localStorage.getItem("user_id");

    if (!title) {
        alert("Project title required");
        return;
    }

    fetch("http://127.0.0.1:5000/create-project", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user_id, title, description })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            loadProjects();
            document.getElementById("projectTitle").value = "";
            document.getElementById("projectDesc").value = "";
        } else alert(data.message);
    });
}


// LOAD PROJECTS
function loadProjects() {
    const user_id = localStorage.getItem("user_id");

    fetch(`http://127.0.0.1:5000/get-projects?user_id=${user_id}`)
    .then(res => res.json())
    .then(data => {

        const myContainer = document.getElementById("myProjectsContainer");
        const sharedContainer = document.getElementById("sharedProjectsContainer");

        myContainer.innerHTML = "";
        sharedContainer.innerHTML = "";

        // MY PROJECTS
        if (!data.owned || data.owned.length === 0) {
            myContainer.innerHTML = "<p class='text-gray-400'>No projects yet</p>";
        } else {
            data.owned.forEach(project => {
                const card = `
                <div onclick="openProject(${project.project_id})"
                     class="bg-cardDark p-5 rounded-2xl shadow-lg hover:scale-105 transition cursor-pointer border border-green-500/40 hover:border-green-400">

                    <h3 class="text-xl font-semibold">${project.title}</h3>
                    <p class="text-gray-400 text-sm mt-1">${project.description || ""}</p>

                    <div class="mt-3 text-xs text-green-400 font-medium">Owner</div>
                </div>
                `;
                myContainer.innerHTML += card;
            });
        }

        // SHARED PROJECTS
        if (!data.shared || data.shared.length === 0) {
            sharedContainer.innerHTML = "<p class='text-gray-400'>No shared projects</p>";
        } else {
            data.shared.forEach(project => {
                const card = `
                <div onclick="openProject(${project.project_id})"
                     class="bg-cardDark p-5 rounded-2xl shadow-lg hover:scale-105 transition cursor-pointer border border-blue-500/40 hover:border-blue-400">

                    <h3 class="text-xl font-semibold">${project.title}</h3>
                    <p class="text-gray-400 text-sm mt-1">${project.description || ""}</p>

                    <div class="mt-3 text-xs text-blue-400 font-medium">
                        Shared (${project.role})
                    </div>
                </div>
                `;
                sharedContainer.innerHTML += card;
            });
        }

    });
}


// AUTO LOAD
window.onload = loadProjects;

</script>

</body>
</html>
