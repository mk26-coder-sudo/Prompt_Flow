<!DOCTYPE html>
<html>
<head>
    <title>PromptFlow Login</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: "#0f172a",
                        cardDark: "#1e293b",
                        accent: "#3b82f6"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center min-h-screen text-white">

<div class="bg-cardDark/80 backdrop-blur p-8 rounded-2xl shadow-xl border border-gray-700 w-full max-w-md">

    <!-- TITLE -->
    <h2 class="text-3xl font-bold text-center mb-2">🚀 PromptFlow</h2>
    <p class="text-gray-400 text-center mb-6 text-sm">Login to continue</p>

    <!-- EMAIL -->
    <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 p-3 rounded-lg bg-gray-800 border border-gray-700 
        focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>

    <!-- PASSWORD -->
    <input id="password" type="password" placeholder="Password"
        class="w-full mb-5 p-3 rounded-lg bg-gray-800 border border-gray-700 
        focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>

    <!-- BUTTON -->
    <button onclick="loginUser()"
        class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 py-3 rounded-lg font-semibold shadow hover:scale-105 transition">
        Login
    </button>

    <!-- ERROR -->
    <p id="errorMsg" class="text-red-400 text-sm mt-4 text-center hidden"></p>

    <!-- REGISTER -->
    <p class="text-sm text-center mt-4 text-gray-400">
        New user? <span class="text-blue-400 cursor-pointer hover:underline">Register</span>
    </p>

</div>

<script>
function loginUser() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        showError("Email and password required");
        return;
    }

    fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("LOGIN RESPONSE:", data);

        if (data.status === "success") {

            localStorage.clear();

            localStorage.setItem("user_id", data.user_id);
            localStorage.setItem("username", data.username);

            window.location.href = "/dashboard";

        } else {
            showError(data.message);
        }
    })
    .catch(err => {
        console.error("LOGIN ERROR:", err);
        showError("Server error");
    });
}

function showError(msg) {
    const error = document.getElementById("errorMsg");
    error.innerText = msg;
    error.classList.remove("hidden");
}
</script>

</body>
</html>
